name: Deploy Demo Store

on:
  push:
    branches: [main]
    paths:
      - 'apps/demo-store/**'

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.DEMO_STORE_SERVICE_ID }}
